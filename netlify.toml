[build]
  command = "npm run build"
  publish = "dist"
  environment = { SECRETS_SCAN_OMIT_PATHS = ".firebaserc,src/assets/documents/*,src/assets/data/data.js" }

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[context.production]
  command = "npm run build"
  publish = "dist"
  environment = { SECRETS_SCAN_OMIT_PATHS = ".firebaserc,src/assets/documents/*,src/assets/data/data.js" }
